<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="100%" style="stop-color:#09090b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="375" height="812" fill="url(#bg)" rx="40"/>
  <!-- Status bar -->
  <text x="30" y="52" fill="#a1a1aa" font-family="system-ui" font-size="14" font-weight="600">9:41</text>
  <rect x="290" y="40" width="25" height="12" rx="3" fill="none" stroke="#a1a1aa" stroke-width="1.5"/>
  <rect x="292" y="42" width="16" height="8" rx="2" fill="#a1a1aa"/>
  <!-- Logo placeholder -->
  <circle cx="187" cy="320" r="60" fill="url(#accent)" opacity="0.15"/>
  <circle cx="187" cy="320" r="40" fill="url(#accent)" opacity="0.3"/>
  <circle cx="187" cy="320" r="24" fill="url(#accent)"/>
  <text x="187" y="328" fill="white" font-family="system-ui" font-size="20" font-weight="bold" text-anchor="middle">C</text>
  <!-- App Name -->
  <text x="187" y="430" fill="white" font-family="system-ui" font-size="36" font-weight="bold" text-anchor="middle">CiteCoach</text>
  <!-- Tagline -->
  <text x="187" y="465" fill="#a1a1aa" font-family="system-ui" font-size="16" text-anchor="middle">AI-powered citation assistant</text>
  <!-- Loading indicator -->
  <circle cx="175" cy="540" r="4" fill="#6366f1" opacity="0.4"/>
  <circle cx="187" cy="540" r="4" fill="#6366f1" opacity="0.7"/>
  <circle cx="199" cy="540" r="4" fill="#6366f1"/>
  <!-- Annotation -->
  <text x="187" y="760" fill="#52525b" font-family="system-ui" font-size="11" text-anchor="middle">Auto-advances after 2.5 seconds</text>
</svg>
