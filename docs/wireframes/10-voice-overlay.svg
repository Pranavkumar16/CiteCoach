<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#312e81"/>
      <stop offset="50%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="375" height="812" fill="url(#bg)" rx="40"/>
  <text x="30" y="52" fill="rgba(255,255,255,0.6)" font-family="system-ui" font-size="14" font-weight="600">9:41</text>
  <!-- Header -->
  <text x="40" y="100" fill="rgba(255,255,255,0.7)" font-family="system-ui" font-size="20">✕</text>
  <text x="187" y="100" fill="white" font-family="system-ui" font-size="18" font-weight="600" text-anchor="middle">Voice Input</text>
  <!-- Waveform bars -->
  <rect x="115" y="290" width="8" height="50" rx="4" fill="white" opacity="0.4"/>
  <rect x="131" y="270" width="8" height="90" rx="4" fill="white" opacity="0.5"/>
  <rect x="147" y="250" width="8" height="130" rx="4" fill="white" opacity="0.6"/>
  <rect x="163" y="240" width="8" height="150" rx="4" fill="white" opacity="0.8"/>
  <rect x="179" y="230" width="8" height="170" rx="4" fill="white" opacity="1.0"/>
  <rect x="195" y="245" width="8" height="140" rx="4" fill="white" opacity="0.7"/>
  <rect x="211" y="260" width="8" height="110" rx="4" fill="white" opacity="0.5"/>
  <rect x="227" y="280" width="8" height="70" rx="4" fill="white" opacity="0.4"/>
  <rect x="243" y="295" width="8" height="40" rx="4" fill="white" opacity="0.3"/>
  <!-- Status -->
  <text x="187" y="460" fill="white" font-family="system-ui" font-size="20" font-weight="600" text-anchor="middle">Listening...</text>
  <!-- Transcribed text area -->
  <rect x="40" y="490" width="295" height="100" rx="16" fill="rgba(255,255,255,0.08)"/>
  <text x="187" y="530" fill="white" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">"What are the key findings</text>
  <text x="187" y="555" fill="white" font-family="system-ui" font-size="16" font-weight="600" text-anchor="middle">in chapter three?"</text>
  <!-- Mic button -->
  <circle cx="187" cy="650" r="40" fill="#ef4444"/>
  <text x="187" y="658" fill="white" font-family="system-ui" font-size="28" text-anchor="middle">🎤</text>
  <text x="187" y="710" fill="rgba(255,255,255,0.5)" font-family="system-ui" font-size="13" text-anchor="middle">Tap to stop</text>
  <!-- Send button -->
  <rect x="100" y="740" width="175" height="46" rx="23" fill="rgba(255,255,255,0.15)"/>
  <text x="187" y="769" fill="white" font-family="system-ui" font-size="15" font-weight="600" text-anchor="middle">Send  →</text>
</svg>
