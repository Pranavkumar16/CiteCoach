<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="100%" style="stop-color:#09090b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="progress" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="375" height="812" fill="url(#bg)" rx="40"/>
  <text x="30" y="52" fill="#a1a1aa" font-family="system-ui" font-size="14" font-weight="600">9:41</text>
  <!-- Close button -->
  <text x="345" y="100" fill="#a1a1aa" font-family="system-ui" font-size="20" text-anchor="end">✕</text>
  <!-- Gear icon -->
  <rect x="152" y="120" width="70" height="70" rx="20" fill="#6366f1" opacity="0.15"/>
  <text x="187" y="165" fill="#6366f1" font-family="system-ui" font-size="30" text-anchor="middle">⚙</text>
  <!-- Title -->
  <text x="187" y="230" fill="white" font-family="system-ui" font-size="24" font-weight="bold" text-anchor="middle">Processing Document</text>
  <text x="187" y="255" fill="#a1a1aa" font-family="system-ui" font-size="13" text-anchor="middle">Generating embeddings for pages...</text>
  <!-- Progress Card -->
  <rect x="30" y="290" width="315" height="100" rx="16" fill="#27272a"/>
  <text x="46" y="318" fill="#a1a1aa" font-family="system-ui" font-size="12">Overall Progress</text>
  <text x="329" y="318" fill="white" font-family="system-ui" font-size="18" font-weight="bold" text-anchor="end">62%</text>
  <rect x="46" y="332" width="283" height="10" rx="5" fill="#3f3f46"/>
  <rect x="46" y="332" width="175" height="10" rx="5" fill="url(#progress)"/>
  <text x="46" y="368" fill="#a1a1aa" font-family="system-ui" font-size="11">8/12 pages</text>
  <text x="329" y="368" fill="#a1a1aa" font-family="system-ui" font-size="11" text-anchor="end">24 chunks</text>
  <!-- Steps -->
  <text x="30" y="430" fill="#a1a1aa" font-family="system-ui" font-size="12" font-weight="600">STEPS</text>
  <!-- Step 1: Complete -->
  <rect x="30" y="445" width="315" height="52" rx="12" fill="#27272a"/>
  <circle cx="56" cy="471" r="14" fill="#22c55e" opacity="0.15"/>
  <text x="56" y="476" fill="#22c55e" font-family="system-ui" font-size="14" text-anchor="middle">✓</text>
  <text x="80" y="468" fill="white" font-family="system-ui" font-size="14">Extracting Text</text>
  <text x="80" y="484" fill="#52525b" font-family="system-ui" font-size="11">12 pages extracted</text>
  <text x="329" y="476" fill="#22c55e" font-family="system-ui" font-size="11" text-anchor="end">Done</text>
  <!-- Step 2: Complete -->
  <rect x="30" y="505" width="315" height="52" rx="12" fill="#27272a"/>
  <circle cx="56" cy="531" r="14" fill="#22c55e" opacity="0.15"/>
  <text x="56" y="536" fill="#22c55e" font-family="system-ui" font-size="14" text-anchor="middle">✓</text>
  <text x="80" y="528" fill="white" font-family="system-ui" font-size="14">Chunking</text>
  <text x="80" y="544" fill="#52525b" font-family="system-ui" font-size="11">24 chunks created</text>
  <text x="329" y="536" fill="#22c55e" font-family="system-ui" font-size="11" text-anchor="end">Done</text>
  <!-- Step 3: In progress -->
  <rect x="30" y="565" width="315" height="52" rx="12" fill="#27272a" stroke="#6366f1" stroke-width="1"/>
  <circle cx="56" cy="591" r="14" fill="#6366f1" opacity="0.15"/>
  <text x="56" y="596" fill="#6366f1" font-family="system-ui" font-size="12" text-anchor="middle">◉</text>
  <text x="80" y="588" fill="white" font-family="system-ui" font-size="14" font-weight="600">Embedding</text>
  <text x="80" y="604" fill="#a1a1aa" font-family="system-ui" font-size="11">Processing chunk 16/24...</text>
  <text x="329" y="596" fill="#6366f1" font-family="system-ui" font-size="11" text-anchor="end">62%</text>
  <!-- Step 4: Pending -->
  <rect x="30" y="625" width="315" height="52" rx="12" fill="#27272a"/>
  <circle cx="56" cy="651" r="14" fill="#3f3f46" opacity="0.3"/>
  <circle cx="56" cy="651" r="4" fill="#52525b"/>
  <text x="80" y="648" fill="#52525b" font-family="system-ui" font-size="14">Finalizing</text>
  <text x="80" y="664" fill="#3f3f46" font-family="system-ui" font-size="11">Waiting...</text>
</svg>
