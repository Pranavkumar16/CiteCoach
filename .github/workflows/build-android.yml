name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Clone llama.cpp into Android cpp directory
        run: |
          cd android/app/src/main/cpp
          git clone --branch b4547 --depth 1 https://github.com/ggerganov/llama.cpp.git

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Build Android APK (Release)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: citecoach-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload APK (Debug) for testing
        if: failure()
        run: flutter build apk --debug
        continue-on-error: true

      - name: Upload Debug APK on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: citecoach-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
